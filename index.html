<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ДНК-Гексаграмма Визуализация</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        
        /* Стили линий гексаграммы */
        .hexagram { display: flex; flex-direction: column-reverse; gap: 8px; margin: 20px auto; width: 120px; }
        .line { height: 12px; width: 100%; position: relative; }
        
        /* Сплошная линия (Ян) */
        .yang { background-color: #2c3e50; }
        
        /* Прерывистая линия (Инь) */
        .yin { display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 45%; height: 100%; background-color: #e74c3c; }

        .label { font-size: 0.8rem; color: #7f8c8d; margin-top: 5px; }
        .codon-text { font-size: 1.5rem; font-weight: bold; letter-spacing: 5px; color: #34495e; }
        .divider { border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Кодон ДНК: <span class="codon-text">GAC</span></h2>
    <p>Структура из 6 линий (снизу вверх)</p>
    
    <div class="hexagram">
        <!-- Нуклеотид 1: G (Основание гексаграммы) -->
        <div class="line yang"></div>
        <div class="line yin"></div>
        
        <!-- Нуклеотид 2: A -->
        <div class="line yang"></div>
        <div class="line yang"></div>
        
        <!-- Нуклеотид 3: C (Вершина гексаграммы) -->
        <div class="line yin"></div>
        <div class="line yang"></div>
    </div>

    <div class="divider"></div>
    
    <div style="display: flex; justify-content: space-around; font-size: 0.9rem;">
        <div><strong>C</strong><br>Линии 5-6</div>
        <div><strong>A</strong><br>Линии 3-4</div>
        <div><strong>G</strong><br>Линии 1-2</div>
    </div>
</div>

</body>
</html>
