<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    /* Золотая палитра */
    --gold-bright: #fff2ac;
    --gold-main: #d4af37;
    --gold-dark: #aa841e;
    --glass: rgba(0, 0, 0, 0.7);
  }

  body { 
    margin: 0; 
    background: radial-gradient(circle at center, #1a150a 0%, #000 100%); 
    overflow-x: hidden;
    font-family: 'Segoe UI', serif;
    color: white;
  }

  /* Слой 1: Живой фон ДНК */
  .scene {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    perspective: 1200px;
    z-index: 1;
  }

  .dna {
    position: relative;
    width: 150px;
    height: 700px;
    transform-style: preserve-3d;
    animation: rotate 40s linear infinite;
  }

  .strand {
    position: absolute;
    width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
    left: 50%;
    margin-left: -80px;
  }

  /* Золотые шарики (Стержневая модель) */
  .strand::before, .strand::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    top: -4px;
    background: radial-gradient(circle at 30% 30%, var(--gold-bright), var(--gold-dark));
    box-shadow: 0 0 10px var(--gold-main);
  }

  .strand::before { left: 0; }
  .strand::after { right: 0; }

  @keyframes rotate {
    from { transform: rotateY(0deg) rotateX(15deg); }
    to { transform: rotateY(360deg) rotateX(15deg); }
  }

  /* Слой 2: Интерфейс калькулятора */
  .overlay-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
    min-height: 100vh;
  }

  .calc-card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--gold-dark);
    padding: 30px;
    border-radius: 25px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }

  h1 { 
    font-weight: 300; 
    letter-spacing: 4px; 
    color: var(--gold-main);
    margin-bottom: 30px;
    font-size: 1.4rem;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid var(--gold-dark);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    box-sizing: border-box;
  }

  button {
    background: var(--gold-main);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
    text-transform: uppercase;
  }

  button:hover {
    background: var(--gold-bright);
    transform: scale(1.02);
  }

  /* Стиль для 64 кодонов (активации) */
  .active-gate::before, .active-gate::after {
    width: 12px; height: 12px; top: -6px;
    box-shadow: 0 0 20px #fff;
    background: #fff;
  }
</style>
</head>
<body>

  <!-- Фон -->
  <div class="scene">
    <div class="dna" id="dna-spiral"></div>
  </div>

  <!-- Контент -->
  <div class="overlay-container">
    <div class="calc-card">
      <h1>HUMAN DESIGN</h1>
      <p style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 20px;">Введите данные рождения для активации вашей ДНК</p>
      
      <input type="text" placeholder="Имя">
      <input type="date">
      <input type="time">
      <input type="text" placeholder="Место рождения">
      
      <button onclick="calculate()">Рассчитать карту</button>
    </div>
  </div>

  <script>
    const dnaContainer = document.getElementById('dna-spiral');
    const totalCodons = 64; // Ровно 64 звена

    // Отрисовка золотой спирали
    for (let i = 1; i <= totalCodons; i++) {
      const strand = document.createElement('div');
      strand.className = 'strand';
      
      const yPos = (i - (totalCodons/2)) * 14; // Высота шага
      const rotation = i * 13.5; // Угол спирали
      
      strand.style.transform = `translateY(${yPos}px) rotateY(${rotation}deg)`;
      strand.id = `gate-${i}`;
      
      dnaContainer.appendChild(strand);
    }

    // Функция "Расчета"
    function calculate() {
      alert("Начинаю расчет активаций планет... Сейчас ваши ворота вспыхнут на спирали!");
      
      // Имитация активации случайных ворот (кодонов)
      const randomGates = [10, 25, 34, 57, 51, 61]; 
      
      randomGates.forEach(num => {
        const el = document.getElementById(`gate-${num}`);
        if(el) el.classList.add('active-gate');
      });
    }
  </script>

</body>
</html>
