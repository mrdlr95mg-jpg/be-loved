<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>64 Кодона в Спирали ДНК</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0c;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #dna-container {
            perspective: 1000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scene {
            position: relative;
            width: 200px;
            height: 400px;
            transform-style: preserve-3d;
            animation: rotate DNA 20s linear infinite;
        }

        .codon {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform-style: preserve-3d;
            transition: all 0.3s;
        }

        .codon::after {
            content: attr(data-label);
            position: absolute;
            font-size: 8px;
            top: 15px;
            left: -10px;
            opacity: 0;
        }

        .codon:hover::after {
            opacity: 1;
        }

        .bond {
            position: absolute;
            height: 2px;
            background: rgba(255,255,255,0.2);
            transform-origin: left center;
        }

        @keyframes rotateDNA {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .legend {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>Генетический код: 64 Кодона</h1>
        <p>Каждая точка — это триплет (кодон). Всего 64 комбинации.</p>
    </div>

    <div id="dna-container">
        <div class="scene" id="scene"></div>
    </div>

    <div class="legend">
        <div><span style="color: #ff4d4d">●</span> Аденин (A)</div>
        <div><span style="color: #4dff88">●</span> Гуанин (G)</div>
        <div><span style="color: #4db8ff">●</span> Цитозин (C)</div>
        <div><span style="color: #ffff4d">●</span> Урацил/Тимин (U/T)</div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const totalCodons = 64;
        const bases = ['A', 'U', 'G', 'C'];
        const colors = { 'A': '#ff4d4d', 'U': '#ffff4d', 'G': '#4dff88', 'C': '#4db8ff' };

        // Генерируем 64 кодона (триплеты)
        let codons = [];
        for(let i=0; i<4; i++) {
            for(let j=0; j<4; j++) {
                for(let k=0; k<4; k++) {
                    codons.push(bases[i] + bases[j] + bases[k]);
                }
            }
        }

        // Размещаем их по спирали
        codons.forEach((name, i) => {
            const angle = i * 0.4; // Угол поворота
            const yPos = (i - totalCodons/2) * 12; // Позиция по вертикали
            const radius = 80;

            // Нить 1
            createNode(name, angle, yPos, radius, true);
            // Нить 2 (комплементарная/зеркальная для симметрии)
            createNode(name, angle + Math.PI, yPos, radius, false);
            
            // Создаем соединительную линию (связь)
            createBond(angle, yPos, radius);
        });

        function createNode(name, angle, y, r, isMain) {
            const node = document.createElement('div');
            node.className = 'codon';
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            
            // Цвет зависит от первой буквы кодона для визуализации
            node.style.backgroundColor = colors[name[0]];
            node.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            node.setAttribute('data-label', name);
            scene.appendChild(node);
        }

        function createBond(angle, y, r) {
            const bond = document.createElement('div');
            bond.className = 'bond';
            bond.style.width = (r * 2) + 'px';
            const x = Math.cos(angle + Math.PI) * r;
            const z = Math.sin(angle + Math.PI) * r;
            
            bond.style.transform = `translate3d(${x}px, ${y+6}px, ${z}px) rotateY(${-angle * 180 / Math.PI}deg)`;
            scene.appendChild(bond);
        }
    </script>
</body>
</html>
