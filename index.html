<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Почему в кодоне 3 буквы?</title>
    <style>
        body { margin: 0; background: #050505; color: #e0cc8d; font-family: sans-serif; overflow: hidden; }
        .ui { position: absolute; width: 100%; text-align: center; top: 20px; z-index: 10; }
        #container { perspective: 1200px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .scene { position: relative; width: 200px; height: 500px; transform-style: preserve-3d; animation: rot 20s linear infinite; }
        @keyframes rot { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        
        .base { position: absolute; width: 12px; height: 12px; border-radius: 50%; }
        /* Активная сторона - та, что читается */
        .side-a { background: gold; box-shadow: 0 0 15px gold; }
        /* Зеркальная сторона - просто пара */
        .side-b { background: #443300; opacity: 0.5; }
        
        .bond { position: absolute; height: 1px; background: rgba(255,215,0,0.2); transform-origin: left center; }
        
        /* Выделение трех букв одного кодона */
        .highlight { background: #ff0055 !important; box-shadow: 0 0 25px #ff0055 !important; width: 16px; height: 16px; }
        .codon-label {
            position: absolute; left: 40px; color: #ff0055; font-weight: bold; font-size: 20px;
            transform: translateZ(20px); white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="ui">
        <h1>1 Кодон = 3 буквы на ОДНОЙ нити</h1>
        <p>Ступенька парная, но информация считывается только с <b style="color:gold">Золотой стороны</b></p>
    </div>
    <div id="container"><div class="scene" id="scene"></div></div>

    <script>
        const scene = document.getElementById('scene');
        const steps = 50;
        const radius = 90;
        const highlighted = [22, 23, 24]; // 3 ступеньки для кодона

        for (let i = 0; i < steps; i++) {
            const angle = i * 0.4;
            const y = (i - steps/2) * 18;
            const isTarget = highlighted.includes(i);

            // Нить А (Информационная)
            createPoint(angle, y, radius, 'side-a' + (isTarget ? ' highlight' : ''), isTarget && i===23 ? "КОДОН (3 буквы)" : "");
            // Нить Б (Вспомогательная - зеркальная)
            createPoint(angle + Math.PI, y, radius, 'side-b', "");
            // Ступенька
            createLine(angle + Math.PI, y, radius);
        }

        function createPoint(a, y, r, cls, labelText) {
            const p = document.createElement('div');
            p.className = 'base ' + cls;
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            p.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            if(labelText) {
                const l = document.createElement('div');
                l.className = 'codon-label';
                l.innerText = labelText;
                p.appendChild(l);
            }
            scene.appendChild(p);
        }

        function createLine(a, y, r) {
            const l = document.createElement('div');
            l.className = 'bond';
            l.style.width = (r * 2) + 'px';
            l.style.transform = `translate3d(${Math.cos(a)*r}px, ${y+6}px, ${Math.sin(a)*r}px) rotateY(${-a * 180 / Math.PI}deg)`;
            scene.appendChild(l);
        }
    </script>
</body>
</html>
