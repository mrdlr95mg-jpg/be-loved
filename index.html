<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кодон GAC в деталях</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #container { perspective: 1000px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .scene { position: relative; width: 300px; height: 300px; transform-style: preserve-3d; animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .step { position: absolute; width: 200px; height: 2px; transform-style: preserve-3d; }
        
        /* Стили для азотистых оснований */
        .base { 
            position: absolute; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 20px; border: 2px solid #fff;
        }

        /* Цвета букв */
        .G { background: #4dff88; color: #000; } /* Гуанин - зеленый */
        .A { background: #ff4d4d; color: #fff; } /* Аденин - красный */
        .C { background: #4db8ff; color: #000; } /* Цитозин - синий */
        .T { background: #ffff4d; color: #000; } /* Тимин - желтый */

        .label-main { color: gold; position: absolute; top: -50px; width: 100%; text-align: center; font-size: 14px; }
        .backbone { position: absolute; width: 4px; height: 400px; background: gold; border-radius: 10px; opacity: 0.3; }
    </style>
</head>
<body>

    <div style="position:absolute; top:20px; text-align:center; width:100%;">
        <h1 style="color:gold;">Кодон GAC (Аспарагиновая кислота)</h1>
        <p>Информация считывается только с левой (яркой) стороны</p>
    </div>

    <div id="container">
        <div class="scene" id="scene">
            <!-- Кодон GAC будет построен здесь через JS -->
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const codon = ['G', 'A', 'C'];
        const pairs = { 'G': 'C', 'A': 'T', 'C': 'G', 'T': 'A' };

        codon.forEach((letter, i) => {
            const step = document.createElement('div');
            step.className = 'step';
            
            const angle = i * 0.5; // Смещение по спирали
            const y = i * 80 - 80; // Расстояние между ступеньками
            
            // Левая сторона (Информационная)
            const baseLeft = document.createElement('div');
            baseLeft.className = `base ${letter}`;
            baseLeft.style.left = '0';
            baseLeft.innerText = letter;
            if (i === 0) baseLeft.innerHTML += '<div class="label-main">Нить 1 (Код)</div>';

            // Правая сторона (Зеркальная)
            const baseRight = document.createElement('div');
            const pairLetter = pairs[letter];
            baseRight.className = `base ${pairLetter}`;
            baseRight.style.right = '0';
            baseRight.style.opacity = '0.4'; // Тусклая, так как она вторична
            baseRight.innerText = pairLetter;
            if (i === 0) baseRight.innerHTML += '<div class="label-main" style="color:gray">Нить 2 (Копия)</div>';

            // Перекладина (связь)
            const bond = document.createElement('div');
            bond.style.position = 'absolute';
            bond.style.width = '100%';
            bond.style.height = '4px';
            bond.style.background = 'rgba(255,255,255,0.2)';
            bond.style.top = '18px';

            step.appendChild(baseLeft);
            step.appendChild(baseRight);
            step.appendChild(bond);

            step.style.transform = `translate3d(0, ${y}px, 0) rotateY(${angle * 50}deg)`;
            scene.appendChild(step);
        });
    </script>
</body>
</html>
