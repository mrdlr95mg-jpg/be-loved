<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Порядок кодонов в ДНК</title>
    <style>
        body { margin: 0; background: #080a10; color: #fff; font-family: sans-serif; overflow: hidden; }
        .info { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; }
        #dna { perspective: 1200px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .scene { position: relative; width: 40px; height: 100%; transform-style: preserve-3d; animation: rotate 25s linear infinite; }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .nucleotide { position: absolute; width: 12px; height: 12px; border-radius: 50%; }
        .connection { position: absolute; height: 2px; transform-origin: left center; opacity: 0.3; }
        
        /* Цвета для разных кодонов в цепочке */
        .codon-type-1 { background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .codon-type-2 { background: #4dff88; box-shadow: 0 0 10px #4dff88; }
        .codon-type-3 { background: #4db8ff; box-shadow: 0 0 10px #4db8ff; }
        .codon-type-4 { background: #ffff4d; box-shadow: 0 0 10px #ffff4d; }

        .codon-label {
            position: absolute; left: 100px; font-size: 12px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>Последовательность кодонов</h1>
        <p>Каждые 3 ступеньки одного цвета — это отдельный кодон (слово)</p>
    </div>

    <div id="dna">
        <div class="scene" id="scene"></div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const totalNucleotides = 60; // 20 кодонов по 3 нуклеотида
        const radius = 80;

        for (let i = 0; i < totalNucleotides; i++) {
            const angle = i * 0.4;
            const y = (i - totalNucleotides / 2) * 20;
            
            // Определяем, к какому кодону относится нуклеотид (i / 3)
            const codonIndex = Math.floor(i / 3);
            const codonColorClass = `codon-type-${(codonIndex % 4) + 1}`;

            // Создаем основную нить (считываемую)
            createPoint(angle, y, radius, codonColorClass, i % 3 === 1 ? `Кодон ${codonIndex + 1}` : "");
            
            // Создаем вторую нить (золотистая, вспомогательная)
            createPoint(angle + Math.PI, y, radius, "secondary");

            // Перекладина
            createLine(angle + Math.PI, y, radius);
        }

        function createPoint(a, y, r, cls, labelText) {
            const p = document.createElement('div');
            p.className = 'nucleotide ' + cls;
            if (cls === "secondary") p.style.background = "rgba(218,165,32,0.3)";
            
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            p.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            
            if (labelText) {
                const l = document.createElement('div');
                l.className = 'codon-label';
                l.innerText = labelText;
                p.appendChild(l);
            }
            scene.appendChild(p);
        }

        function createLine(a, y, r) {
            const l = document.createElement('div');
            l.className = 'connection';
            l.style.background = "white";
            l.style.width = (r * 2) + "px";
            l.style.transform = `translate3d(${Math.cos(a)*r}px, ${y+6}px, ${Math.sin(a)*r}px) rotateY(${-a * 180 / Math.PI}deg)`;
            scene.appendChild(l);
        }
    </script>
</body>
</html>
