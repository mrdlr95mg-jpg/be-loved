<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA 3D Immersion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        
        /* Заголовок поверх анимации */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            pointer-events: none; /* Чтобы не мешать вращению */
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h2>Погружение в генезис</h2>
    </div>

    <!-- Подключаем библиотеку Three.js из CDN -->
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev';

        // Основные настройки
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Группа для всей спирали
        const dna = new THREE.Group();
        scene.add(dna);

        // Материалы
        const sphereMat = new THREE.MeshPhongMaterial({ color: 0x3399ff, shininess: 100 });
        const sphereMat2 = new THREE.MeshPhongMaterial({ color: 0xff3366, shininess: 100 });
        const lineMat = new THREE.MeshPhongMaterial({ color: 0x555555 });

        // Создаем 64 кодона (пары)
        const numPairs = 64;
        for (let i = 0; i < numPairs; i++) {
            const y = (i - numPairs / 2) * 0.5; // Расстояние по вертикали
            const angle = i * 0.3; // Угол закручивания
            const radius = 3;

            // Сферы (Шарики)
            const sphereGeom = new THREE.SphereGeometry(0.2, 16, 16);
            
            const ball1 = new THREE.Mesh(sphereGeom, sphereMat);
            ball1.position.set(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
            dna.add(ball1);

            const ball2 = new THREE.Mesh(sphereGeom, sphereMat2);
            ball2.position.set(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius);
            dna.add(ball2);

            // Соединительный стержень
            const cylinderGeom = new THREE.CylinderGeometry(0.05, 0.05, radius * 2, 8);
            const rod = new THREE.Mesh(cylinderGeom, lineMat);
            rod.position.y = y;
            rod.rotation.z = Math.PI / 2;
            rod.rotation.y = -angle;
            dna.add(rod);
        }

        // Освещение
        const light1 = new THREE.PointLight(0xffffff, 1, 100);
        light1.position.set(10, 10, 10);
        scene.add(light1);

        const light2 = new THREE.AmbientLight(0x404040); // Мягкий общий свет
        scene.add(light2);

        camera.position.z = 15;

        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            // Медленное спокойное вращение
            dna.rotation.y += 0.005;
            dna.rotation.x += 0.002;

            renderer.render(scene, camera);
        }

        // Подстройка под размер экрана
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
