<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .codon-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    
    .base-pair {
        width: 250px; height: 80px;
        border: 2px solid #333;
        display: flex; flex-direction: column;
        position: relative;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        overflow: hidden;
    }

    /* Две линии внутри одной ступеньки ДНК */
    .line {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 12px;
        letter-spacing: 2px;
        transition: 0.3s;
    }

    .line.yin { background: repeating-linear-gradient(90deg, #ff0077, #ff0077 40%, transparent 40%, transparent 60%, #ff0077 60%); height: 8px; margin: 10px 20px; }
    .line.yang { background: #00f2ff; height: 8px; margin: 10px 20px; }

    .label-base { position: absolute; left: -60px; top: 25px; color: #00f2ff; font-weight: bold; }
    .label-info { position: absolute; right: -150px; font-size: 10px; color: #888; width: 140px; }

    h2 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 40px; }
</style>
</head>
<body>

<div class="codon-container">
    <h2>СТРУКТУРА 1 КОДОНА (ГЕКСАГРАММА)</h2>
    
    <!-- Ступенька 3 -->
    <div class="base-pair">
        <div class="label-base">БАЗА 3</div>
        <div class="line yang"></div> <!-- Линия 6 -->
        <div class="line yin"></div>  <!-- Линия 5 -->
        <div class="label-info">Линия 6: Тип связи<br>Линия 5: Тип молекулы</div>
    </div>

    <!-- Ступенька 2 -->
    <div class="base-pair">
        <div class="label-base">БАЗА 2</div>
        <div class="line yin"></div>  <!-- Линия 4 -->
        <div class="line yang"></div> <!-- Линия 3 -->
        <div class="label-info">Линия 4: Тип связи<br>Линия 3: Тип молекулы</div>
    </div>

    <!-- Ступенька 1 -->
    <div class="base-pair">
        <div class="label-base">БАЗА 1</div>
        <div class="line yang"></div> <!-- Линия 2 -->
        <div class="line yang"></div> <!-- Линия 1 -->
        <div class="label-info">Линия 2: Тип связи<br>Линия 1: Тип молекулы</div>
    </div>

    <div style="margin-top: 30px; text-align: center; color: #888; max-width: 400px; font-size: 14px;">
        Каждая "ступенька" ДНК — это <b>двойной переключатель</b>. 
        3 ступеньки кодона дают 2+2+2 = 6 линий гексаграммы.
    </div>
</div>

</body>
</html>
