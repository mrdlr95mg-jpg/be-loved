<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    
    .orbit-container { position: relative; width: 500px; height: 500px; border: 1px dashed #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: rotate 60s linear infinite; }
    
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .gate { position: absolute; width: 40px; text-align: center; font-size: 10px; transition: 0.3s; }
    .gate:hover { color: #00f2ff; transform: scale(1.5); font-weight: bold; cursor: pointer; }

    /* Линии гексаграммы внутри кольца */
    .mini-hex { height: 12px; display: flex; flex-direction: column-reverse; gap: 1px; margin-bottom: 2px; }
    .l { height: 1.5px; width: 15px; margin: 0 auto; }
    .yang { background: #00f2ff; }
    .yin { background: #ff0055; opacity: 0.6; }

    .center-body { position: absolute; width: 120px; opacity: 0.7; filter: drop-shadow(0 0 10px #00f2ff); animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
</style>
</head>
<body>

    <div class="orbit-container" id="wheel">
        <!-- Гексаграммы-ворота генерируются здесь -->
        <img src="https://upload.wikimedia.org" class="center-body" alt="Человек">
    </div>

<script>
    const wheel = document.getElementById('wheel');
    const totalGates = 64;
    const radius = 230;

    for (let i = 1; i <= totalGates; i++) {
        const angle = (i / totalGates) * 2 * Math.PI;
        const x = Math.cos(angle) * radius + 250 - 20;
        const y = Math.sin(angle) * radius + 250 - 10;
        
        const gate = document.createElement('div');
        gate.className = 'gate';
        gate.style.left = x + 'px';
        gate.style.top = y + 'px';
        gate.style.transform = `rotate(${angle + Math.PI/2}rad)`;
        
        // Рисуем упрощенную гексаграмму
        let hex = '<div class="mini-hex">';
        for(let j=0; j<6; j++) {
            const type = Math.random() > 0.5 ? 'yang' : 'yin';
            hex += `<div class="l ${type}"></div>`;
        }
        hex += '</div>';
        
        gate.innerHTML = hex + i;
        wheel.appendChild(gate);
    }
</script>
</body>
</html>
