<!DOCTYPE html>
<html>
<head>
<style>
    :root { --yang: #00f2ff; --yin: #ff0055; --bg: #050505; }
    body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    
    .main-container { display: flex; gap: 50px; padding: 40px; flex-wrap: wrap; justify-content: center; }

    /* Контейнер 3D ДНК */
    .dna-viewport { perspective: 1000px; width: 300px; height: 500px; background: rgba(255,255,255,0.02); border-radius: 20px; position: relative; }
    .dna-helix { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; animation: rotateDNA 15s linear infinite; }
    
    @keyframes rotateDNA { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    .nucleotide-pair {
        position: absolute; width: 180px; height: 4px; left: 60px;
        transform-style: preserve-3d; background: rgba(255,255,255,0.1);
    }
    .sphere { position: absolute; width: 12px; height: 12px; border-radius: 50%; top: -4px; }
    .sphere.left { left: 0; background: var(--yang); box-shadow: 0 0 10px var(--yang); }
    .sphere.right { right: 0; background: var(--yin); box-shadow: 0 0 10px var(--yin); }

    /* Подсветка сегмента гексаграммы (3 пары нуклеотидов) */
    .hex-segment { background: white; height: 6px; box-shadow: 0 0 15px white; }

    /* Матрица 8x8 */
    .matrix-container { text-align: center; }
    .matrix { display: grid; grid-template-columns: repeat(8, 45px); gap: 5px; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; }
    .cell { width: 45px; height: 45px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
    .cell:hover { background: #333; border-color: var(--yang); transform: scale(1.1); z-index: 10; }
    
    /* Маленькие линии гексаграммы в ячейке */
    .mini-hex { display: flex; flex-direction: column-reverse; gap: 2px; width: 20px; margin-bottom: 3px; }
    .m-line { height: 2px; width: 100%; border-radius: 1px; }
    .m-yang { background: var(--yang); }
    .m-yin { display: flex; justify-content: space-between; }
    .m-yin div { width: 40%; height: 100%; background: var(--yin); }

    h2 { font-weight: 300; letter-spacing: 2px; color: var(--yang); }
</style>
</head>
<body>

    <h2>ДНК: Квантовая Матрица Гексаграмм</h2>

    <div class="main-container">
        <!-- 3D Спираль -->
        <div class="dna-viewport">
            <div class="dna-helix" id="helix"></div>
            <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 12px; color: #666;">
                Каждый светящийся сегмент —<br>полная гексаграмма (3 ступени)
            </div>
        </div>

        <!-- Матрица 64 -->
        <div class="matrix-container">
            <div class="matrix" id="matrix"></div>
            <p style="font-size: 14px; margin-top: 20px; color: #888;">
                Развертка 64 кодонов (Система Фу-Си)<br>
                <span style="color: var(--yang)">●</span> — Ян (A/G) | <span style="color: var(--yin)">●</span> — Инь (C/T)
            </p>
        </div>
    </div>

<script>
    // Генерация спирали
    const helix = document.getElementById('helix');
    for (let i = 0; i < 24; i++) {
        const pair = document.createElement('div');
        pair.className = 'nucleotide-pair';
        if (Math.floor(i / 3) % 2 === 0) pair.classList.add('hex-segment');
        
        pair.style.top = (i * 18) + 'px';
        pair.style.transform = `rotateY(${i * 30}deg)`;
        pair.innerHTML = `<div class="sphere left"></div><div class="sphere right"></div>`;
        helix.appendChild(pair);
    }

    // Генерация матрицы 64
    const matrix = document.getElementById('matrix');
    const bases = ['A', 'C', 'G', 'U'];
    
    // Упрощенный цикл для создания 64 ячеек
    for (let i = 0; i < 64; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        // Создаем визуальную гексаграмму (упрощенно для сетки)
        let hexHTML = '<div class="mini-hex">';
        for(let l=0; l<6; l++) {
            if ((i + l) % 2 === 0) {
                hexHTML += '<div class="m-line m-yang"></div>';
            } else {
                hexHTML += '<div class="m-line m-yin"><div></div><div></div></div>';
            }
        }
        hexHTML += '</div>';
        
        const codon = bases[i % 4] + bases[Math.floor(i / 4) % 4] + bases[Math.floor(i / 16) % 4];
        cell.innerHTML = hexHTML + codon;
        matrix.appendChild(cell);
    }
</script>
</body>
</html>
