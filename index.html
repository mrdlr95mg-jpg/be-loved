<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Loved - DNA Visualization</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Georgia', serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer {
            position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; padding: 40px; box-sizing: border-box;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 25px; max-width: 400px; text-align: center; pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.2rem; color: #d4af37; margin-bottom: 15px; letter-spacing: 1px; }
        p { font-size: 0.9rem; line-height: 1.6; opacity: 0.8; }
        .footer-phrase { color: #d4af37; font-style: italic; font-size: 1.1rem; margin-bottom: 20px; opacity: 0.9; }
        .print-note { font-size: 0.75rem; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-layer">
        <div class="glass-panel">
            <h1>3D Визуализация ДНК</h1>
            <p>Ваши 64 кодона выстроены в гармоничную спираль. Золотое свечение указывает на ваши определенные ворота.</p>
            <p class="print-note">✨ Возможно, если вы распечатаете это на листе бумаги, вам будет гораздо приятнее на это смотреть</p>
        </div>
        <div class="footer-phrase">Будьте любимы жизнью...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const group = new THREE.Group();
        const segments = 64;        const myGates = [10, 25, 37, 51]; // Здесь будут твои ворота

        for (let i = 0; i < segments; i++) {
            const angle = i * 0.4;
            const y = (i - segments/2) * 0.5;
            const x = Math.cos(angle) * 4;
            const z = Math.sin(angle) * 4;

            const isHighlighted = myGates.includes(i + 1);
            const geometry = new THREE.SphereGeometry(isHighlighted ? 0.25 : 0.15, 16, 16);
            const material = new THREE.MeshStandardMaterial({
                color: isHighlighted ? 0xd4af37 : 0x333333,
                emissive: isHighlighted ? 0xd4af37 : 0x000000,
                emissiveIntensity: isHighlighted ? 0.5 : 0,
                metalness: 1, roughness: 0.2
            });

            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            group.add(sphere);

            if (i > 0) {
                const prevAngle = (i-1) * 0.4;
                const prevY = (i-1 - segments/2) * 0.5;
                const prevX = Math.cos(prevAngle) * 4;
                const prevZ = Math.sin(prevAngle) * 4;
                
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(x, y, z), new THREE.Vector3(prevX, prevY, prevZ)
                ]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.3 });
                group.add(new THREE.Line(lineGeo, lineMat));
            }
        }
        scene.add(group);

        const light1 = new THREE.PointLight(0xffffff, 1);
        light1.position.set(10, 10, 10);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 20;

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005;
            group.rotation.x += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
