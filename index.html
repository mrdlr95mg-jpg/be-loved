<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .helix-container { display: flex; flex-direction: column; gap: 15px; align-items: center; perspective: 1000px; }
    
    .base-pair-row {
        display: flex; align-items: center; gap: 20px;
        transform: rotateX(20deg);
    }

    .strand {
        width: 40px; height: 40px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 18px;
    }

    .strand.left { background: #00f2ff; box-shadow: 0 0 15px #00f2ff; color: #000; }
    .strand.right { background: #ff0077; box-shadow: 0 0 15px #ff0077; color: #000; }

    /* Линия гексаграммы как мост */
    .bridge-line {
        width: 120px; height: 10px;
        position: relative;
        display: flex; justify-content: center; align-items: center;
    }

    .yang-bridge { background: linear-gradient(90deg, #00f2ff, #ff0077); border-radius: 5px; }
    .yin-bridge { 
        display: flex; width: 120px; justify-content: space-between;
    }
    .yin-part { width: 45px; height: 10px; background: #555; border-radius: 5px; }

    .label-pos { font-size: 10px; color: #888; width: 60px; text-align: center; }
</style>
</head>
<body>

<div class="helix-container">
    <h2 style="color: #00f2ff; margin-bottom: 30px;">ПАРА НУКЛЕОТИДОВ = 1 ЛИНИЯ</h2>

    <!-- Пара 3 (Дает линии 5 и 6) -->
    <div class="base-pair-row">
        <div class="strand left">A</div>
        <div class="bridge-line yang-bridge"></div>
        <div class="strand right">T</div>
        <div class="label-pos">Линия 6</div>
    </div>
    <div class="base-pair-row" style="margin-top: -10px;">
        <div style="width: 40px;"></div>
        <div class="bridge-line yin-bridge"><div class="yin-part"></div><div class="yin-part"></div></div>
        <div style="width: 40px;"></div>
        <div class="label-pos">Линия 5</div>
    </div>

    <!-- Пара 2 (Дает линии 3 и 4) -->
    <div class="base-pair-row">
        <div class="strand left">G</div>
        <div class="bridge-line yang-bridge"></div>
        <div class="strand right">C</div>
        <div class="label-pos">Линия 4</div>
    </div>
    <div class="base-pair-row" style="margin-top: -10px;">
        <div style="width: 40px;"></div>
        <div class="bridge-line yang-bridge"></div>
        <div style="width: 40px;"></div>
        <div class="label-pos">Линия 3</div>
    </div>

    <!-- Пара 1 (Дает линии 1 и 2) -->
    <div class="base-pair-row">
        <div class="strand left">C</div>
        <div class="bridge-line yin-bridge"><div class="yin-part"></div><div class="yin-part"></div></div>
        <div class="strand right">G</div>
        <div class="label-pos">Линия 2</div>
    </div>
    <div class="base-pair-row" style="margin-top: -10px;">
        <div style="width: 40px;"></div>
        <div class="bridge-line yang-bridge"></div>
        <div style="width: 40px;"></div>
        <div class="label-pos">Линия 1</div>
    </div>

    <p style="color: #888; font-size: 12px; max-width: 300px; text-align: center; margin-top: 20px;">
        В каждой паре оснований скрыто 2 информационных вопроса. <br>
        3 пары = 6 ответов = 6 линий.
    </p>
</div>

</body>
</html>
