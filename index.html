<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #050505; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    
    .dna-stage { perspective: 1000px; width: 400px; height: 500px; }
    .dna-strand { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: rot 15s linear infinite; }
    
    @keyframes rot { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    .pair { position: absolute; width: 200px; height: 4px; left: 100px; transform-style: preserve-3d; }
    
    /* Шарики нуклеотидов */
    .n { position: absolute; width: 14px; height: 14px; border-radius: 50%; top: -5px; }
    
    /* Личность (Черный/Сознательное - 2 линия) */
    .personality { left: 0; background: #222; border: 2px solid #555; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    
    /* Дизайн (Красный/Тело - 4 линия) */
    .design { right: 0; background: #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }

    .line-label { position: absolute; font-size: 10px; color: #888; width: 100px; }

    .legend { margin-top: 40px; padding: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); text-align: center; }
    .title { color: #ff4d4d; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
</style>
</head>
<body>

    <div class="legend">
        <div class="title">ПРОФИЛЬ 2 / 4</div>
        <div style="font-size: 0.9rem;">Черная нить: 2-я линия (Интровертный разум)<br>
        <span style="color: #ff4d4d;">Красная нить: 4-я линия (Общительное тело)</span></div>
    </div>

    <div class="dna-stage">
        <div class="dna-strand" id="helix"></div>
    </div>

<script>
    const helix = document.getElementById('helix');
    for (let i = 0; i < 30; i++) {
        const pair = document.createElement('div');
        pair.className = 'pair';
        pair.style.top = (i * 16) + 'px';
        pair.style.transform = `rotateY(${i * 24}deg)`;
        
        // Визуализируем "переплетенность" личности и дизайна
        pair.innerHTML = `
            <div class="n personality"></div>
            <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin-top: 1px;"></div>
            <div class="n design"></div>
        `;
        helix.appendChild(pair);
    }
</script>
</body>
</html>
