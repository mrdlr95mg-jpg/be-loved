<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DNA Seduction</title>
    <style>
        body { margin: 0; background: #000000; font-family: 'Raleway', sans-serif; overflow: hidden; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 50px 30px; box-sizing: border-box;
            text-align: center; color: #e6d8ad; /* Золотисто-бежевый */
            pointer-events: none; /* Чтобы UI не мешал вращать */
        }
        .ui-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 30px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            max-width: 500px;
            pointer-events: auto; /* Чтобы кликать по элементам UI, если они будут */
        }
        h1 { font-size: 1.8rem; letter-spacing: 5px; margin: 0 0 15px 0; text-transform: uppercase; opacity: 0.9; }
        p { font-size: 0.95rem; line-height: 1.7; opacity: 0.7; }
        .footer-text {
            font-size: 1.2rem; font-style: italic; opacity: 0.8;
            text-shadow: 0 0 15px rgba(230, 216, 173, 0.7); /* Мягкое золотое свечение */
        }
        @import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div class="ui-overlay">
        <div class="ui-glass">
            <h1>Ядро бытия</h1>
            <p>Ваши 64 кодона, пульсирующие в совершенной двойной спирали. Золотое сияние — это вы.</p>
        </div>
        <div class="footer-text">Будьте любимы жизнью...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        function resizeRenderer() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            // Zoom adjustment for better view in different aspect ratios
            if (width / height > 1.5) { // Wider screen
                camera.position.z = 25;
            } else { // Taller screen
                camera.position.z = 20;
            }
        }
        window.addEventListener('resize', resizeRenderer);
        resizeRenderer();

        document.getElementById('canvas').appendChild(renderer.domElement);

        const group = new THREE.Group();
        const segments = 64;
        const radiusBase = 3.5;
        const heightStep = 0.5; // Increased height for more separation

        // Materials with a bit more depth
        const goldMat = new THREE.MeshStandardMaterial({ 
            color: 0xe6d8ad, // Softer gold
            metalness: 0.9, 
            roughness: 0.1, 
            emissive: 0x553300, 
            emissiveIntensity: 0.5 
        });
        const darkMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, // Very dark grey for the other strand
            metalness: 0.7, 
            roughness: 0.3
        });
        const bondMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.1, // More subtle bonds
            side: THREE.DoubleSide 
        });

        function createAtom(x, y, z, mat, size) {
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 18), mat); // Increased detail
            sphere.position.set(x, y, z);
            return sphere;
        }

        function createBond(v1, v2) {
            const direction = v2.clone().sub(v1);
            const distance = direction.length();
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, distance, 10), bondMat);
            cylinder.position.copy(v1).add(v2).multiplyScalar(0.5);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.normalize());
            return cylinder;
        }

        for (let i = 0; i < segments; i++) {
            // Slightly tilted angle for a more dynamic helix
            const angle = i * 0.45 + i * 0.02; 
            const y = (i - segments/2) * heightStep;            const currentRadius = radiusBase * (1 + Math.sin(i * 0.1) * 0.1); // Slight pulsing effect on radius

            // Strand 1 (Gold)
            const x1 = Math.cos(angle) * currentRadius;
            const z1 = Math.sin(angle) * currentRadius;
            const atom1 = createAtom(x1, y, z1, goldMat, 0.15); // Slightly smaller atoms for more detail
            group.add(atom1);

            // Strand 2 (Dark)
            const x2 = Math.cos(angle + Math.PI) * currentRadius;
            const z2 = Math.sin(angle + Math.PI) * currentRadius;
            const atom2 = createAtom(x2, y, z2, darkMat, 0.15);
            group.add(atom2);

            // Base Pair bond
            group.add(createBond(atom1.position, atom2.position));

            // Connect along the strand
            if (i > 0) {
                const prevAngle = (i-1) * 0.45 + (i-1) * 0.02;
                const prevY = (i-1 - segments/2) * heightStep;
                const prevRadius = radiusBase * (1 + Math.sin((i-1) * 0.1) * 0.1);
                
                const vPrev1 = new THREE.Vector3(Math.cos(prevAngle)*prevRadius, prevY, Math.sin(prevAngle)*prevRadius);
                group.add(createBond(atom1.position, vPrev1));

                const vPrev2 = new THREE.Vector3(Math.cos(prevAngle + Math.PI)*prevRadius, prevY, Math.sin(prevAngle + Math.PI)*prevRadius);
                group.add(createBond(atom2.position, vPrev2));
            }
        }
        scene.add(group);

        // Dynamic lighting - subtle pulsing
        const light1 = new THREE.PointLight(0xffffff, 0.8);
        light1.position.set(15, 15, 15);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xd4af37, 1.2); // Brighter gold light
        light2.position.set(-15, -15, -15);
        scene.add(light2);

        scene.add(new THREE.AmbientLight(0x111111)); // Very subtle ambient light

        camera.position.z = 22; 

        function animate() {
            requestAnimationFrame(animate);
            // Subtle rotation for dynamism
            group.rotation.y += 0.002; 
            // Subtle sway/bounce for life
            group.rotation.x = Math.sin(Date.now() * 0.0004) * 0.05; 
            group.rotation.z = Math.cos(Date.now() * 0.0003) * 0.03; 
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
