<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --gold: #d4af37;
    --gold-bright: #fff2ac;
    --glass: rgba(10, 10, 10, 0.85);
  }

  body, html { 
    margin: 0; padding: 0; background: #000; height: 100%; 
    font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; 
  }

  /* ФОНОВАЯ ЗОЛОТАЯ ДНК */
  .world {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    perspective: 1000px;
    z-index: 1;
    transition: transform 3s ease-in-out;
  }

  .dna {
    position: relative;
    width: 200px;
    height: 150vh;
    transform-style: preserve-3d;
    animation: rotateDNA 40s linear infinite;
  }

  .strand {
    position: absolute;
    width: 240px;
    height: 2px;
    left: 50%;
    margin-left: -120px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .strand::before, .strand::after {
    content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%;
    top: -4px; background: radial-gradient(circle at 30% 30%, #fff, var(--gold));
    box-shadow: 0 0 15px var(--gold);
  }
  .strand::before { left: 0; }
  .strand::after { right: 0; }

  @keyframes rotateDNA {
    from { transform: rotateY(0deg) rotateX(10deg); }
    to { transform: rotateY(360deg) rotateX(10deg); }
  }

  /* ИНТЕРФЕЙС */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 1.5s ease;
  }

  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 35px 25px;
    border-radius: 30px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    width: 85%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
  }

  h1 { font-weight: 300; letter-spacing: 4px; color: var(--gold); margin: 0 0 25px; font-size: 1.3rem; }

  .row { margin-bottom: 20px; text-align: left; }
  label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-left: 5px; }

  input {
    width: 100%; padding: 14px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px;
    color: white; margin-top: 5px; box-sizing: border-box; font-size: 1rem;
  }

  .gender-box { display: flex; gap: 10px; margin-top: 8px; }
  .g-btn {
    flex: 1; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px; background: none; color: white; cursor: pointer; transition: 0.3s;
  }
  .g-btn.active { background: var(--gold); color: black; font-weight: bold; }

  .calculate-btn {
    width: 100%; padding: 18px; background: var(--gold); border: none;
    border-radius: 15px; font-weight: bold; margin-top: 15px;
    cursor: pointer; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* ЭФФЕКТ ПОГРУЖЕНИЯ */
  .immersion .container { opacity: 0; transform: scale(0.5); pointer-events: none; }
  .immersion .world { transform: scale(3) translateZ(500px); }
</style>
</head>
<body>

  <div class="world">
    <div class="dna" id="dna"></div>
  </div>

  <div class="container" id="ui">
    <div class="glass-card">
      <h1>DESIGN GENESIS</h1>
      
      <div class="row">
        <label>Ваш пол</label>
        <div class="gender-box">
          <button class="g-btn active" onclick="selectGender(this)">М</button>
          <button class="g-btn" onclick="selectGender(this)">Ж</button>
        </div>
      </div>

      <div class="row">
        <label>Дата рождения</label>
        <input type="date">
      </div>

      <div class="row">
        <label>Точное время</label>
        <input type="time">
      </div>

      <button class="calculate-btn" onclick="goDeep()">АКТИВИРОВАТЬ ДНК</button>
    </div>
  </div>

  <script>
    // Создаем 64 звена ДНК (кодоны)
    const dnaBox = document.getElementById('dna');
    for (let i = 0; i < 64; i++) {
      const strand = document.createElement('div');
      strand.className = 'strand';
      // Равномерно распределяем по всей высоте
      strand.style.top = (i * 1.56) + "%"; 
      strand.style.transform = "rotateY(" + (i * 13.5) + "deg)";
      dnaBox.appendChild(strand);
    }

    function selectGender(btn) {
      document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function goDeep() {
      // Включаем режим погружения
      document.body.classList.add('immersion');
      
      // Через 2 секунды выдаем результат
      setTimeout(() => {
        alert("Генетический профиль рассчитан. Ваши 64 кодона синхронизированы с Бодиграфом.");
        // Здесь в будущем можно перенаправить на страницу с Бодиграфом
      }, 2500);
    }
  </script>
</body>
</html><!-- ЭФФЕКТЫ ХРАМА, ОКЕАНА И МУЗЫКИ -->
<style>
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(20, 30, 48, 0.4), #000); z-index: 0; pointer-events: none; }
  .mist { position: fixed; bottom: 0; left: 0; width: 100%; height: 45vh; background: linear-gradient(to top, rgba(212, 175, 55, 0.15), transparent); filter: blur(60px); z-index: 2; pointer-events: none; }
  .temple-light { position: fixed; top: 0; width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.4), transparent); z-index: 1; pointer-events: none; }
  .l1 { left: 10%; } .l2 { right: 10%; }
  
  /* Кнопка Музыки */
  .music-control {
    position: fixed; top: 20px; right: 20px; z-index: 150;
    background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold);
    color: var(--gold); border-radius: 50%; width: 45px; height: 45px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px); font-size: 20px;
  }
</style>

<div class="stars"></div>
<div class="mist"></div>
<div class="temple-light l1"></div>
<div class="temple-light l2"></div>

<button class="music-control" id="musicBtn" onclick="toggleMusic()">◈</button>

<script>
  // Ссылка на эмбиент-медитацию (безопасный источник)
  const audio = new Audio('https://www.soundhelix.com');
  audio.loop = true;
  let isPlaying = false;

  function toggleMusic() {
    const btn = document.getElementById('musicBtn');
    if (!isPlaying) {
      audio.play();
      btn.innerHTML = '◈'; // Символ активного звука
      btn.style.boxShadow = '0 0 15px #d4af37';
    } else {
      audio.pause();
      btn.innerHTML = '◇'; // Символ тишины
      btn.style.boxShadow = 'none';
    }
    isPlaying = !isPlaying;
  }

  // Эффект легкого покачивания всей сцены (как на волнах)
  document.addEventListener('deviceorientation', (event) => {
    const x = event.beta / 5; 
    const y = event.gamma / 5;
    document.querySelector('.world').style.transform = `translate(${y}px, ${x}px)`;
  });
</script>
