<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Human Design - Prototyp</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 12px;
            border: 1px solid #333; pointer-events: none; width: 280px;
        }
        .gate-list { font-size: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .design { color: #ff4d4d; } /* Красный - Бессознательное */
        .personality { color: #ffffff; } /* Белый/Черный - Личность */
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h3 id="part-name">Bodygraph 3D</h3>
    <p id="part-info" style="font-size: 13px; color: #ccc;">Вращайте модель и наводите на центры</p>
    <hr style="border: 0.5px solid #444">
    <div style="font-size: 11px; margin-bottom: 5px;">Случайные активации (26):</div>
    <div id="activations" class="gate-list"></div>
</div>

<!-- Подключаем Three.js через обычные скрипты для стабильности -->
<script src="https://cdnjs.cloudflare.com"></script>
<script src="https://cdn.jsdelivr.net"></script>

<script>
    // 1. Генерация 26 случайных активаций
    const generateGates = () => {
        const gates = [];
        for(let i=0; i<13; i++) gates.push({ val: Math.floor(Math.random()*64)+1, type: 'personality' });
        for(let i=0; i<13; i++) gates.push({ val: Math.floor(Math.random()*64)+1, type: 'design' });
        return gates;
    };
    const myGates = generateGates();
    const listDiv = document.getElementById('activations');
    myGates.forEach(g => {
        const span = document.createElement('span');
        span.className = g.type;
        span.innerText = (g.type === 'design' ? '🔴 ' : '⚪ ') + g.val + ' ворота';
        listDiv.appendChild(span);
    });

    // 2. Сцена
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    camera.position.z = 5;

    // 3. Объекты: Тело и Центры
    const centersData = [
        { name: "Теменной", pos: [0, 2.2, 0], color: 0xffffff, bio: "Шишковидная железа (Давление)" },
        { name: "Аджна", pos: [0, 1.7, 0], color: 0x00ff00, bio: "Гипофиз (Обработка)" },
        { name: "Горловой", pos: [0, 1.1, 0], color: 0x8888ff, bio: "Щитовидная железа (Выражение)" },
        { name: "G-Центр", pos: [0, 0.4, 0], color: 0xffff00, bio: "Печень (Идентичность)" },
        { name: "Сердце", pos: [0.3, 0.3, 0.2], color: 0xff0000, bio: "Сердечно-сосудистая система (Воля)" },
        { name: "Селезенка", pos: [-0.7, -0.2, 0], color: 0x996633, bio: "Лимфатическая система (Инстинкт)" },
        { name: "Сакрал", pos: [0, -0.6, 0], color: 0xff0000, bio: "Репродуктивные органы (Энергия)" },
        { name: "Эмоции", pos: [0.7, -0.2, 0], color: 0xccaa00, bio: "Нервная система / Почки" },
        { name: "Корневой", pos: [0, -1.4, 0], color: 0x555555, bio: "Надпочечники (Стресс)" }
    ];

    const centerMeshes = [];
    
    // Прозрачный силуэт
    const bodyGeo = new THREE.IcosahedronGeometry(1.2, 2);
    const bodyMat = new THREE.MeshBasicMaterial({ color: 0x4444ff, wireframe: true, transparent: true, opacity: 0.1 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.scale.set(1, 2, 0.8);
    scene.add(body);

    // Отрисовка центров
    centersData.forEach(d => {
        const geo = new THREE.SphereGeometry(0.15, 16, 16);
        const mat = new THREE.MeshPhongMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.4 });
        const sphere = new THREE.Mesh(geo, mat);
        sphere.position.set(...d.pos);
        sphere.userData = d;
        scene.add(sphere);
        centerMeshes.push(sphere);
    });

    // Свет
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 2);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 4. Raycaster (Интерактив)
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(centerMeshes);

        if (intersects.length > 0) {
            const o = intersects[0].object.userData;
            document.getElementById('part-name').innerText = o.name;
            document.getElementById('part-info').innerText = o.bio;
        }
    });

    // 5. Цикл анимации
    function animate() {
        requestAnimationFrame(animate);
        body.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
