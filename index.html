<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --gold: #ffd700;
    --blue: #00d4ff;
    --magenta: #ff0077;
    --glass: rgba(255, 255, 255, 0.1);
  }

  body { 
    margin: 0; 
    background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
    overflow-x: hidden;
    font-family: 'Segoe UI', Roboto, sans-serif;
    color: white;
  }

  /* Шапка */
  .header {
    position: fixed;
    top: 20px;
    width: 90%;
    left: 5%;
    padding: 20px;
    background: var(--glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    text-align: center;
    z-index: 100;
  }

  .header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 3px; font-weight: 300; }
  .header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.7; }

  /* Контейнер для 3D ДНК */
  .scene {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    perspective: 1200px;
  }

  .dna {
    position: relative;
    width: 200px;
    height: 600px;
    transform-style: preserve-3d;
    animation: rotate 30s linear infinite;
  }

  .strand {
    position: absolute;
    width: 180px;
    height: 2px;
    background: rgba(255,255,255,0.05);
    left: 50%;
    margin-left: -90px;
  }

  /* Шарики-атомы */
  .strand::before, .strand::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    top: -4px;
  }

  .strand::before { left: 0; background: var(--blue); box-shadow: 0 0 10px var(--blue); }
  .strand::after { right: 0; background: var(--magenta); box-shadow: 0 0 10px var(--magenta); }

  /* Эффект активации (Золотые ворота) */
  .active::before, .active::after {
    background: var(--gold) !important;
    box-shadow: 0 0 20px var(--gold) !important;
    width: 14px; height: 14px; top: -6px;
  }

  @keyframes rotate {
    from { transform: rotateY(0deg) rotateX(10deg); }
    to { transform: rotateY(360deg) rotateX(10deg); }
  }

  /* Кнопка действия */
  .action-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    background: var(--gold);
    color: black;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(255,215,0,0.3);
    z-index: 100;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>3D GENETIC DESIGN</h1>
    <p>Визуализация активации 64 кодонов</p>
  </div>

  <div class="scene">
    <div class="dna" id="dna-spiral">
      <!-- Код сгенерирует 64 звена через скрипт ниже -->
    </div>
  </div>

  <button class="action-btn" onclick="window.print()">Распечатать карту (А4)</button>

  <script>
    const dnaContainer = document.getElementById('dna-spiral');
    const totalCodons = 64;
    
    // Номера ворот, которые мы "активируем" (для примера)
    const activatedGates = [1, 10, 25, 34, 57, 64];

    for (let i = 1; i <= totalCodons; i++) {
      const strand = document.createElement('div');
      strand.className = 'strand';
      
      // Рассчитываем положение каждого из 64 звеньев
      const yPos = (i - (totalCodons/2)) * 12;
      const rotation = i * 13.5; // Угол закручивания спирали
      
      strand.style.transform = `translateY(${yPos}px) rotateY(${rotation}deg)`;
      
      // Если номер итерации совпадает с "активированными воротами"
      if (activatedGates.includes(i)) {
        strand.classList.add('active');
      }
      
      dnaContainer.appendChild(strand);
    }
  </script>

</body>
</html>
