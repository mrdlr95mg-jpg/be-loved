<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #0a0a0c; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    
    .codon-focus { position: relative; width: 180px; display: flex; flex-direction: column-reverse; gap: 8px; padding: 20px; border: 1px solid #333; background: rgba(255,255,255,0.02); }
    
    /* Базовый стиль линии */
    .line { height: 14px; width: 100%; position: relative; border-radius: 2px; background: #222; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #444; }

    /* Линия 2 - Личность (Черная/Белая активация) */
    .line-2 { background: #eee; color: #000; box-shadow: 0 0 15px #fff; border: 1px solid #fff; font-weight: bold; }
    
    /* Линия 4 - Дизайн (Красная активация) */
    .line-4 { background: #ff4d4d; color: #fff; box-shadow: 0 0 15px #ff4d4d; font-weight: bold; }

    .nucleotide-tag { position: absolute; left: -100px; font-size: 12px; color: #666; width: 80px; text-align: right; }
</style>
</head>
<body>

    <h2 style="font-family: sans-serif; letter-spacing: 2px;">ВНУТРИ ОДНОГО КОДОНА</h2>
    <p style="color: #888; font-size: 14px; margin-bottom: 30px;">Профиль 2/4 как внутренние уровни активации</p>

    <div class="codon-focus">
        <!-- Нуклеотид 3 (Линии 5-6) -->
        <div class="line">Линия 6</div>
        <div class="line">Линия 5</div>
        <div class="nucleotide-tag" style="bottom: 80px;">Нуклеотид 3</div>

        <!-- Нуклеотид 2 (Линии 3-4) -->
        <div class="line line-4">ЛИНИЯ 4 (Красная)</div>
        <div class="line">Линия 3</div>
        <div class="nucleotide-tag" style="bottom: 40px;">Нуклеотид 2</div>

        <!-- Нуклеотид 1 (Линии 1-2) -->
        <div class="line line-2">ЛИНИЯ 2 (Черная)</div>
        <div class="line">Линия 1</div>
        <div class="nucleotide-tag" style="bottom: 0px;">Нуклеотид 1</div>
    </div>

    <div style="margin-top: 40px; max-width: 400px; text-align: center; color: #aaa; font-size: 0.9rem;">
        Линии — это не "края" спирали, а <b>вертикальные уровни</b> внутри каждого шага ДНК. Каждая линия — это ~0.9 градуса дуги (5.6° / 6).
    </div>

</body>
</html>
