<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DNA Molecular Mirror</title>
    <style>
        body { margin: 0; background: #020202; color: #d4af37; font-family: 'Georgia', serif; overflow: hidden; }
        .ui { position: absolute; width: 100%; top: 15%; z-index: 10; pointer-events: none; text-align: center; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 30px; 
            display: inline-block; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            max-width: 80%;
        }
        h1 { font-size: 1.4rem; letter-spacing: 3px; margin: 0 0 10px 0; text-transform: uppercase; opacity: 0.9; }
        p { font-size: 0.9rem; font-style: italic; opacity: 0.6; margin: 0; }
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-style: italic; color: #d4af37; opacity: 0.7; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="glass-card">
            <h1>Молекулярная природа</h1>
            <p>Ваша уникальная ДНК в объективном свете...</p>
        </div>
    </div>
    <div class="footer">Будьте любимы жизнью...</div>
    <div id="canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas').appendChild(renderer.domElement);

        const group = new THREE.Group();
        const count = 64; 
        const radius = 3.5;
        const heightStep = 0.45;

        // Материалы
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.2, emissive: 0x221100 });
        const silverMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.4 });
        const bondMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });

        function createAtom(x, y, z, mat, size) {            const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 16, 16), mat);
            sphere.position.set(x, y, z);
            return sphere;
        }

        function createBond(v1, v2) {
            const distance = v1.distanceTo(v2);
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, distance, 8), bondMat);
            cylinder.position.copy(v1).add(v2).multiplyScalar(0.5);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), v2.clone().sub(v1).normalize());
            return cylinder;
        }

        for (let i = 0; i < count; i++) {
            const angle = i * 0.4;
            const y = (i - count/2) * heightStep;

            // Нить 1 (Золотая)
            const x1 = Math.cos(angle) * radius;
            const z1 = Math.sin(angle) * radius;
            const atom1 = createAtom(x1, y, z1, goldMat, 0.18);
            group.add(atom1);

            // Нить 2 (Серебряная/Темная)
            const x2 = Math.cos(angle + Math.PI) * radius;
            const z2 = Math.sin(angle + Math.PI) * radius;
            const atom2 = createAtom(x2, y, z2, silverMat, 0.18);
            group.add(atom2);

            // Перекладина (связь между нитями)
            group.add(createBond(atom1.position, atom2.position));

            // Связь вдоль нити (вертикальная)
            if (i > 0) {
                const prevAngle = (i-1) * 0.4;
                const prevY = (i-1 - count/2) * heightStep;
                
                const vPrev1 = new THREE.Vector3(Math.cos(prevAngle)*radius, prevY, Math.sin(prevAngle)*radius);
                group.add(createBond(atom1.position, vPrev1));

                const vPrev2 = new THREE.Vector3(Math.cos(prevAngle + Math.PI)*radius, prevY, Math.sin(prevAngle + Math.PI)*radius);
                group.add(createBond(atom2.position, vPrev2));
            }
        }

        scene.add(group);

        // Свет (как от свечей и студийный)
        const light1 = new THREE.PointLight(0xffffff, 1);
        light1.position.set(10, 10, 10);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xd4af37, 0.5);
        light2.position.set(-10, -10, -10);
        scene.add(light2);

        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.z = 22;

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.003;
            group.rotation.x = Math.sin(Date.now() * 0.0005) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
