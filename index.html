<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .label {
            position: absolute; width: 100%; text-align: center;
            top: 15%; color: white; font-family: sans-serif;
            letter-spacing: 4px; z-index: 10; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="label">ПОГРУЖЕНИЕ В ГЕНЕЗИС</div>

    <!-- Загружаем библиотеку Three.js -->
    <script src="https://cdnjs.cloudflare.com"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const ballGeo = new THREE.SphereGeometry(0.18, 12, 12);
        const stickGeo = new THREE.CylinderGeometry(0.04, 0.04, 3, 8);
        
        const blueMat = new THREE.MeshPhongMaterial({ color: 0x0077ff });
        const redMat = new THREE.MeshPhongMaterial({ color: 0xff0044 });
        const stickMat = new THREE.MeshPhongMaterial({ color: 0x444444 });

        // Создаем 64 звена ДНК
        for (let i = 0; i < 64; i++) {
            const y = (i - 32) * 0.4;
            const dist = 1.5;
            const angle = i * 0.25;

            const b1 = new THREE.Mesh(ballGeo, blueMat);
            b1.position.set(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
            
            const b2 = new THREE.Mesh(ballGeo, redMat);
            b2.position.set(Math.cos(angle + Math.PI) * dist, y, Math.sin(angle + Math.PI) * dist);

            const stick = new THREE.Mesh(stickGeo, stickMat);
            stick.position.y = y;
            stick.rotation.z = Math.PI / 2;
            stick.rotation.y = -angle;

            dnaGroup.add(b1, b2, stick);
        }

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light, new THREE.AmbientLight(0x333333));

        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            dnaGroup.rotation.y += 0.005; // Вращение вокруг оси
            dnaGroup.rotation.x += 0.001; // Легкий наклон
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
