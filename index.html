<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #050505; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    .canvas { perspective: 1200px; width: 500px; height: 600px; display: flex; align-items: center; justify-content: center; }
    .codon-3d { position: relative; width: 200px; transform-style: preserve-3d; animation: rotate 15s linear infinite; }
    
    @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    /* Пара нуклеотидов (Ступенька) */
    .step { 
        position: absolute; width: 240px; height: 2px; left: -20px;
        display: flex; justify-content: space-between; align-items: center;
        transform-style: preserve-3d; border-top: 1px solid rgba(255,255,255,0.1);
    }

    /* Сами Линии (Нуклеотиды) */
    .line-node { 
        width: 100px; height: 35px; border-radius: 4px; border: 1px solid #333;
        display: flex; align-items: center; justify-content: center; font-size: 10px;
        background: rgba(255,255,255,0.05); color: #666;
    }

    /* Активация ПРОФИЛЯ 2/4 */
    .p-2 { background: #fff !important; color: #000 !important; box-shadow: 0 0 25px #fff; border: none; font-weight: bold; }
    .d-4 { background: #ff4d4d !important; color: #fff !important; box-shadow: 0 0 25px #ff4d4d; border: none; font-weight: bold; }

    .tag { position: absolute; left: -140px; font-size: 12px; color: #444; width: 120px; text-align: right; }
</style>
</head>
<body>

    <h2 style="letter-spacing: 3px; color: #888;">КОДОН: ПРОФИЛЬ 2 / 4</h2>

    <div class="canvas">
        <div class="codon-3d">
            <!-- ПАРА 3 (Верх) -->
            <div class="step" style="top: 0px; transform: rotateY(60deg);">
                <div class="tag">Пара 3 (Топ)</div>
                <div class="line-node">Линия 5 (Л)</div>
                <div class="line-node">Линия 6 (П)</div>
            </div>

            <!-- ПАРА 2 (Середина) -->
            <div class="step" style="top: 100px; transform: rotateY(30deg);">
                <div class="tag">Пара 2 (Мидл)</div>
                <div class="line-node">Линия 3 (Л)</div>
                <div class="line-node d-4">ЛИНИЯ 4 (П)</div>
            </div>

            <!-- ПАРА 1 (Низ) -->
            <div class="step" style="top: 200px; transform: rotateY(0deg);">
                <div class="tag">Пара 1 (База)</div>
                <div class="line-node">Линия 1 (Л)</div>
                <div class="line-node p-2">ЛИНИЯ 2 (П)</div>
            </div>
        </div>
    </div>

    <div style="text-align: center; max-width: 450px; font-size: 0.9rem; border-top: 1px solid #222; padding-top: 20px;">
        <b style="color: #fff;">Итог:</b> Кодон — это 3 ступеньки. На каждой ступеньке 2 позиции (линии). <br>
        Твоя <b>Личность (2)</b> и <b>Тело (4)</b> занимают правую сторону <br> нижней и средней пары нуклеотидов.
    </div>

</body>
</html>
