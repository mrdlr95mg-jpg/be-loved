<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DNA 3D</title>
    <style>
        body { margin: 0; background: #050505; color: #d4af37; font-family: serif; overflow: hidden; text-align: center; }
        .info { position: absolute; width: 100%; top: 20%; z-index: 10; pointer-events: none; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; display: inline-block; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="info">
        <div class="glass">
            <h2>3D Визуализация ДНК</h2>
            <p>Будьте любимы жизнью...</p>
        </div>
    </div>
    <div id="canvas"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);

        const group = new THREE.Group();
        for (let i = 0; i < 64; i++) {
            const angle = i * 0.4;
            const y = (i - 32) * 0.4;
            
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.2 })
            );
            sphere.position.set(Math.cos(angle)*3, y, Math.sin(angle)*3);
            group.add(sphere);

            const sphere2 = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0x666666 })
            );
            sphere2.position.set(Math.cos(angle + Math.PI)*3, y, Math.sin(angle + Math.PI)*3);
            group.add(sphere2);
        }
        scene.add(group);
        scene.add(new THREE.PointLight(0xffffff, 1, 100).clone().position.set(10,10,10));
        scene.add(new THREE.AmbientLight(0x404040));
        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
