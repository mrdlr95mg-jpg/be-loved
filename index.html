<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
    .mandala { position: relative; width: 450px; height: 450px; border: 1px solid #222; border-radius: 50%; }
    
    /* Солнце */
    .sun { 
        position: absolute; width: 30px; height: 30px; background: #ffaa00; border-radius: 50%;
        top: 50%; left: 50%; margin: -15px;
        box-shadow: 0 0 30px #ffaa00;
        offset-path: ray(45deg circle); /* Для анимации по кругу */
        animation: orbit 10s linear infinite;
    }

    @keyframes orbit {
        from { transform: rotate(0deg) translateX(210px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(210px) rotate(-360deg); }
    }

    .info { margin-top: 30px; text-align: center; color: #888; }
    .timer { font-size: 24px; color: #ffaa00; font-weight: bold; }
</style>
</head>
<body>

    <div class="mandala">
        <div class="sun"></div>
        <!-- Здесь 64 деления -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.2;">
            <img src="https://upload.wikimedia.org" width="300">
        </div>
    </div>

    <div class="info">
        <div>Солнце в одной гексаграмме:</div>
        <div class="timer">5 дней 17 часов</div>
        <div style="margin-top: 10px;">Шаг по зодиаку: 5.62°</div>
    </div>

</body>
</html>
