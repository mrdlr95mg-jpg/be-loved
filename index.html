<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Human Design Bodygraph</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; max-width: 300px; border: 1px solid #444;
        }
        canvas { display: block; }
        .controls-hint {
            position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="info">
        <h2 id="title">Bodygraph 3D</h2>
        <p id="desc">Наведите на центр или участок мозга для анализа...</p>
        <div id="activations" style="font-size: 0.8em; color: #aaa;"></div>
    </div>

    <div class="controls-hint">Вращение: ЛКМ | Зум: Колесо | Панорама: ПКМ</div>

    <!-- Подключаем Three.js и OrbitControls -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 1, 5);

        // --- Свет ---
        const light = new THREE.PointLight(0xffffff, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // --- Данные ---
        const centers = [
            { name: "Теменной", pos: [0, 2.5, 0], color: 0xffff00, info: "Шишковидная железа. Давление думать." },
            { name: "Аджна", pos: [0, 2.0, 0.1], color: 0x00ff00, info: "Гипофиз. Обработка данных." },
            { name: "Горловой", pos: [0, 1.4, 0], color: 0x8888ff, info: "Щитовидная железа. Манифестация." },
            { name: "G-Центр", pos: [0, 0.7, 0], color: 0xffaa00, info: "Печень. Направление и любовь." },
            { name: "Сердечный", pos: [0.4, 0.6, 0.1], color: 0xff0000, info: "Сердце. Воля и Эго." },
            { name: "Селезенка", pos: [-0.8, 0, 0], color: 0x996633, info: "Лимфатическая система. Выживание." },
            { name: "Сакрал", pos: [0, -0.5, 0], color: 0xff0000, info: "Репродуктивная система. Жизненная энергия." },
            { name: "Эмоциональный", pos: [0.8, 0, 0], color: 0x996633, info: "Почки / Поджелудочная. Чувства." },
            { name: "Корневой", pos: [0, -1.5, 0], color: 0x555555, info: "Надпочечники. Давление действовать." }
        ];

        // Группы объектов
        const centerMeshes = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- Создание визуальных объектов ---
        
        // 1. Прозрачный силуэт человека (упрощенно)
        const bodyGeo = new THREE.CapsuleGeometry(1, 4, 4, 16);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222, transparent: true, opacity: 0.15, wireframe: true });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        scene.add(body);

        // 2. Создание Центров
        centers.forEach(data => {
            const geo = new THREE.OctahedronGeometry(0.2, 0);
            const mat = new THREE.MeshPhongMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = data;
            scene.add(mesh);
            centerMeshes.push(mesh);
        });

        // 3. Создание Каналов (линии)
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        for(let i=0; i < centers.length - 1; i++) {
            const points = [new THREE.Vector3(...centers[i].pos), new THREE.Vector3(...centers[i+1].pos)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, lineMat);
            scene.add(line);
        }

        // --- Интерактив (Hover) ---
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(centerMeshes);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                document.getElementById('title').innerText = obj.userData.name;
                document.getElementById('desc').innerText = obj.userData.info;
                obj.scale.set(1.5, 1.5, 1.5);
            } else {
                centerMeshes.forEach(m => m.scale.set(1, 1, 1));
            }
        });

        // --- Рендеринг ---
        function animate() {
            requestAnimationFrame(animate);
            body.rotation.y += 0.002; // Медленное вращение для эффекта
            centerMeshes.forEach(m => m.rotation.y += 0.01);
            renderer.render(scene, camera);
        }
        animate();

        // Адаптивность
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
